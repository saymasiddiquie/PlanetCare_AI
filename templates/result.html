<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detection Result - PlantCare AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f9f4; }
        .result-img { max-width: 100%; border-radius: 15px; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .badge-confidence { background: #a8e063; color: #1e3d1a; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <h2 class="mb-4">Diagnosis Results</h2>
            
            <div class="card p-4 shadow-sm">
                <div class="row align-items-center">
                    <div class="col-md-5 mb-3 mb-md-0">
                        <img src="{{ url_for('static', filename=image_path) }}" class="result-img" alt="Uploaded Leaf">
                    </div>
                    <div class="col-md-7">
                        <h4 class="text-success">{{ prediction }}</h4>
                        <p class="mb-3">Confidence Level: <span class="badge badge-confidence">{{ confidence }}</span></p>
                        <hr>
                        <a href="/" class="btn btn-outline-secondary">Try Another Leaf</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
